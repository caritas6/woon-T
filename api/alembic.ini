[alembic]
script_location = migrations
prepend_sys_path = .
# env.py에서 DATABASE_URL 환경변수로 자동 덮어씁니다
# 로컬 직접 실행 시 아래를 편집하거나 .env에 DATABASE_URL을 설정하세요
sqlalchemy.url = postgresql+asyncpg://woont:password@localhost:5432/woont_db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
