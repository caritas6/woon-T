
<style>

<script>
/* ═══════════════════════════════════════════════
   만세력(萬歲曆) 알고리즘
   ══════════════════════════════════════════════ */

const CHEONGAN = ['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
const JIJI = ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
const CG_KR = ['갑','을','병','정','무','기','경','신','임','계'];
const JJ_KR = ['자','축','인','묘','진','사','오','미','신','유','술','해'];

// 오행 매핑
const CG_ELEM = {
  '甲':'木','乙':'木','丙':'火','丁':'火','戊':'土','己':'土',
  '庚':'金','辛':'金','壬':'水','癸':'水'
};
const JJ_ELEM = {
  '子':'水','丑':'土','寅':'木','卯':'木','辰':'土','巳':'火',
  '午':'火','未':'土','申':'金','酉':'金','戌':'土','亥':'水'
};
const ELEM_CLASS = {'木':'stem-wood','火':'stem-fire','土':'stem-earth','金':'stem-metal','水':'stem-water'};
const ELEM_COLOR = {'木':'var(--wood)','火':'var(--fire)','土':'var(--earth)','金':'var(--metal)','水':'var(--water)'};

// 천간 음양
const CG_YIN = {'乙':1,'丁':1,'己':1,'辛':1,'癸':1};

// 기준: 1900년 1월 1일 = 庚子年 庚子月? 
// 실제 만세력: 갑자년 기준 60갑자 순환
// 1900년 = 庚子년: 천간4(庚), 지지0(子)
// 1900.1.1 기준 일진: 甲戌 (천간0, 지지10) 실측 기준 보정 +1
const BASE_YEAR = 1900;
const BASE_YEAR_CG = 6; // 庚
const BASE_YEAR_JJ = 0; // 子

// 년주 계산
function getYearPillar(year) {
  const cg = (BASE_YEAR_CG + (year - BASE_YEAR)) % 10;
  const jj = (BASE_YEAR_JJ + (year - BASE_YEAR)) % 12;
  return { cg: CHEONGAN[cg], jj: JIJI[jj], cgKr: CG_KR[cg], jjKr: JJ_KR[jj] };
}

// 절기표 (월주 계산용) - 각 달의 절입일 (양력 근사)
const SEOLJE = [6,4,6,5,6,6,7,8,8,8,8,7]; // 각 월 절입일 (평균값)
const MONTH_OFFSET_CG = [2,4,6,8,0,2,4,6,8,0,2,4]; // 인월=甲子년 기준 丙

function getMonthPillar(year, month, day) {
  // 절기 기준으로 월주 계산 (근사)
  const monthIdx = day >= SEOLJE[month-1] ? month - 1 : month - 2;
  const mi = ((monthIdx + 12) % 12);
  // 년간에 따른 월간 오프셋
  const yCg = (BASE_YEAR_CG + (year - BASE_YEAR)) % 10;
  const baseMonthCg = (yCg % 5) * 2; // 甲己年→丙寅月
  const cg = (baseMonthCg + mi) % 10;
  const jj = (mi + 2) % 12; // 인월(寅)부터
  return { cg: CHEONGAN[cg], jj: JIJI[jj], cgKr: CG_KR[cg], jjKr: JJ_KR[jj] };
}

function getDayPillar(year, month, day) {
  // 1900.1.1 = 甲戌 (cg=0, jj=10)
  const d0 = new Date(1900, 0, 1);
  const d1 = new Date(year, month - 1, day);
  const diff = Math.round((d1 - d0) / 86400000);
  const cg = ((diff % 10) + 10) % 10;
  const jj = ((diff % 12) + 12) % 12;
  return { cg: CHEONGAN[cg], jj: JIJI[(jj + 10) % 12], cgKr: CG_KR[cg], jjKr: JJ_KR[(jj+10)%12] };
}

function getHourPillar(dayCg, hour) {
  // 일간 기반 시간 계산
  const dayCgIdx = CHEONGAN.indexOf(dayCg);
  const hourBranch = Math.floor(((hour + 1) % 24) / 2);
  const baseHourCg = (dayCgIdx % 5) * 2;
  const cg = (baseHourCg + hourBranch) % 10;
  return { cg: CHEONGAN[cg], jj: JIJI[hourBranch], cgKr: CG_KR[cg], jjKr: JJ_KR[hourBranch] };
}

// 오행 점수 계산
function calcOhaeng(pillars) {
  const score = { '木':0, '火':0, '土':0, '金':0, '水':0 };
  pillars.forEach(p => {
    if (CG_ELEM[p.cg]) score[CG_ELEM[p.cg]] += 2;
    if (JJ_ELEM[p.jj]) score[JJ_ELEM[p.jj]] += 1;
  });
  return score;
}

// 일간 기준 격국 추론
function getGyeokguk(ilgan, score) {
  const elem = CG_ELEM[ilgan];
  const maxElem = Object.entries(score).sort((a,b)=>b[1]-a[1])[0][0];
  const map = {
    '木': { same: '비겁격 (독립가형)', diff: maxElem === '火' ? '식상격 (크리에이터형)' : '재성격 (사업가형)' },
    '火': { same: '비겁격 (열정가형)', diff: maxElem === '土' ? '식상격 (기획가형)' : '인성격 (학자형)' },
    '土': { same: '비겁격 (안정추구형)', diff: maxElem === '金' ? '식상격 (전략가형)' : '관성격 (관리자형)' },
    '金': { same: '비겁격 (승부사형)', diff: maxElem === '水' ? '식상격 (분석가형)' : '인성격 (연구자형)' },
    '水': { same: '비겁격 (자유인형)', diff: maxElem === '木' ? '식상격 (기획자형)' : '재성격 (전문가형)' },
  };
  const sameElem = score[elem];
  return sameElem >= 6 ? (map[elem]?.same || '종격') : (map[elem]?.diff || '잡기격');
}

// 용신 추론
function getYongsin(ilgan, score) {
  const elem = CG_ELEM[ilgan];
  const generates = { '木':'火', '火':'土', '土':'金', '金':'水', '水':'木' };
  const controls = { '木':'土', '火':'金', '土':'水', '金':'木', '水':'火' };
  const weakElems = Object.entries(score).filter(([e,v]) => v <= 2).map(([e]) => e);
  // 일간 기운 강약
  const selfScore = score[elem] || 0;
  if (selfScore >= 6) {
    return `${controls[elem]} · ${generates[elem]} (일간 과강 → 설기·제화)`;
  } else {
    return `${elem} · ${generates[controls[elem]] || '木'} (일간 약 → 부조·보강)`;
  }
}

// 대운 계산 (근사)
function getDaewoon(year, month, day, gender, ilganCg) {
  const isYin = CG_YIN[ilganCg] ? 1 : 0;
  const isForward = (isYin === 0 && gender === 'male') || (isYin === 1 && gender === 'female');
  const currentAge = new Date().getFullYear() - year;
  const daewoons = [];
  let startAge = 3 + (isForward ? 0 : 0); // 대운수 (간략화: 3세 시작)
  for (let i = 0; i < 8; i++) {
    const age = startAge + i * 10;
    const offset = isForward ? i + 1 : -(i + 1);
    const monthP = getMonthPillar(year, month + offset, day);
    const luck = age <= currentAge && currentAge < age + 10;
    const score = (Math.random() * 30 + 55) | 0; // 시연용 운 점수
    daewoons.push({ age, cg: monthP.cg, jj: monthP.jj, cgKr: monthP.cgKr, jjKr: monthP.jjKr, current: luck, score });
  }
  return daewoons;
}

let SAJU_DATA = null;

function runManse() {
  const dateVal = document.getElementById('inp-date').value;
  if (!dateVal) { showError('생년월일을 입력해주세요.'); return; }
  const [y,m,d] = dateVal.split('-').map(Number);
  const hour = parseInt(document.getElementById('inp-hour').value);
  const gender = document.getElementById('inp-gender').value;
  const name = document.getElementById('inp-name').value || '사용자';

  // 사주 계산
  const yearP = getYearPillar(y);
  const monthP = getMonthPillar(y, m, d);
  const dayP = getDayPillar(y, m, d);
  const hourP = getHourPillar(dayP.cg, hour);
  const pillars = [yearP, monthP, dayP, hourP];
  const ohaeng = calcOhaeng(pillars);
  const gyeokguk = getGyeokguk(dayP.cg, ohaeng);
  const yongsin = getYongsin(dayP.cg, ohaeng);
  const daewoons = getDaewoon(y, m, d, gender, dayP.cg);
  SAJU_DATA = { name, y, m, d, hour, gender, yearP, monthP, dayP, hourP, pillars, ohaeng, gyeokguk, yongsin, daewoons,
    situation: document.getElementById('inp-situation').value,
    interest: document.getElementById('inp-interest').value };

  renderManse(pillars, ohaeng, gyeokguk, yongsin, daewoons);
  document.getElementById('step1').classList.add('hidden');
  document.getElementById('step2').classList.remove('hidden');
  setStep(2);
}

  <tbody>

    <td><span class="dw-hanja ${ELEM_CLASS[CG_ELEM[dw.cg]||'土']}" style="color:${ELEM_COLOR[CG_ELEM[dw.cg]||'土']}">${dw.cg}</span></td>

async function runAI() {
  const btn = document.getElementById('ai-btn-text');
  const spinner = document.getElementById('ai-spinner');
  btn.textContent = ' AI 분석 중...';
  spinner.style.display = 'inline-block';
  document.querySelector('.btn-primary').disabled = true;

  const d = SAJU_DATA;
  const prompt = `당신은 명리학(사주 명리)과 현대 커리어 컨설팅을 결합한 전문 AI '운트(Woon-T)'입니다.

아래 사주 데이터를 분석하여 한국어로 진로 상담 리포트를 작성하세요.

【기본 정보】
- 이름: ${d.name}
- 생년월일: ${d.y}년 ${d.m}월 ${d.d}일 ${d.hour}시
- 성별: ${d.gender === 'female' ? '여성' : '남성'}
- 현재 상황: ${d.situation}
- 관심 분야: ${d.interest}

【사주 원국】
- 년주: ${d.yearP.cg}${d.yearP.jj} (${d.yearP.cgKr}${d.yearP.jjKr})
- 월주: ${d.monthP.cg}${d.monthP.jj} (${d.monthP.cgKr}${d.monthP.jjKr})
- 일주: ${d.dayP.cg}${d.dayP.jj} (${d.dayP.cgKr}${d.dayP.jjKr}) ← 일간
- 시주: ${d.hourP.cg}${d.hourP.jj} (${d.hourP.cgKr}${d.hourP.jjKr})

【오행 분포】
${Object.entries(d.ohaeng).map(([e,v])=>`${e}: ${v}점`).join(', ')}

【격국 및 용신】
- 격국: ${d.gyeokguk}
- 용신: ${d.yongsin}

다음 형식으로 분석해주세요 (각 섹션 명확히):
1. [성격 분석] 일간과 격국 기반 핵심 성향 (3-4문장)
2. [강점 직군] 오행과 격국 기반 최적 직군 Top3 - 각각 이유 포함
3. [현재 운세 조언] ${d.situation} 상황에서 지금 해야 할 일 (구체적으로)
4. [주의사항] 부족한 오행 기준 보완할 점

무속적 표현 금지. 심리학·데이터 기반 언어로 현대적으로 표현.
각 섹션을 줄바꿈으로 구분하고, 친근하고 실질적으로 작성.`;

  try {
    document.getElementById('step2').classList.add('hidden');
    document.getElementById('step3').classList.remove('hidden');
    setStep(3);
    document.getElementById('ai-output').innerHTML = '<span class="ai-cursor"></span>';
    document.getElementById('ai-output').classList.add('loading');

    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    const text = data.content?.find(c => c.type === 'text')?.text || '분석 결과를 불러오지 못했습니다.';

    // 스트리밍 효과

function formatAIText(text) {
  return text
    .replace(/\[성격 분석\]/g, '<span style="color:var(--gold-light);font-weight:600">✦ 성격 분석</span>')
    .replace(/\[강점 직군\]/g, '<br><span style="color:var(--gold-light);font-weight:600">✦ 강점 직군</span>')
    .replace(/\[현재 운세 조언\]/g, '<br><span style="color:var(--gold-light);font-weight:600">✦ 현재 운세 조언</span>')
    .replace(/\[주의사항\]/g, '<br><span style="color:var(--gold-light);font-weight:600">✦ 주의사항</span>')
    .replace(/Top3|Top 3/g, 'Top 3')
    .replace(/\n/g, '<br>');
}

③ 콘텐츠 기획/마케터 — 트렌드를 빠르게 포착하는 역마의 감각으로 글로벌 콘텐츠 기획에서 두각을 나타냅니다.

[현재 운세 조언]
${d.situation} 상황에서 지금은 준비보다 '시작'이 중요한 시기입니다. 현재 대운이 木·火 기운의 상승기로, 도전에 유리한 에너지가 흐르고 있습니다. 포트폴리오 1건을 완성하거나 관심 분야의 네트워킹 이벤트에 참석하는 작은 실행이 큰 전환점이 됩니다.

}

async function typeText(id, html) {
  const el = document.getElementById(id);
  el.innerHTML = '';
  const div = document.createElement('div');
  div.innerHTML = html;
  const fullText = div.innerHTML;
  let i = 0;
  const step = 3;
  return new Promise(res => {
    const timer = setInterval(() => {
      i += step;
      el.innerHTML = fullText.slice(0, i);
      if (i >= fullText.length) { el.innerHTML = fullText; clearInterval(timer); res(); }
    }, 12);
  });
}

function setStep(n) {
  for(let i=1;i<=3;i++){
    const c = document.getElementById('sc'+i);
    c.classList.remove('active','done');
    if(i<n) c.classList.add('done');
    else if(i===n) c.classList.add('active');
  }
}

function resetAll() {
  document.getElementById('step3').classList.add('hidden');
  document.getElementById('step2').classList.add('hidden');
  document.getElementById('step1').classList.remove('hidden');
  document.getElementById('ai-output').innerHTML = '분석 중입니다...';
  document.getElementById('job-list').innerHTML = '';
  setStep(1);
}

function showError(msg) {
  document.getElementById('error-area').innerHTML = `<div class="error-box">⚠️ ${msg}</div>`;
  setTimeout(()=>document.getElementById('error-area').innerHTML='', 3000);
}

function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }
